services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-devsecops}
      MYSQL_USER: ${MYSQL_USER:-devsecops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devsecops}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootdevsecops}
    ports:
      - "33060:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: ["--default-authentication-plugin=mysql_native_password"]

  web:
    build: .
    depends_on:
      - db
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-secret-change-me}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-devsecops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devsecops}
      MYSQL_DB: ${MYSQL_DB:-devsecops}
      # Clé Fernet (Fernet attend 32 bytes base64 url-safe).
      # Pour le TP, on fournit une clé par défaut si non fournie.
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-wGf9m1Jbq2eY0g0mFh0x4p9o9pG4f0qY0G2rS2zG7wE=}
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
    command: ["sh", "-c", "python scripts/init_db.py && gunicorn -b 0.0.0.0:5000 wsgi:app --workers 2 --threads 2"]

volumes:
  db_data:

